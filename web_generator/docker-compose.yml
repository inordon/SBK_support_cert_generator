services:
  web:
    build: .
    container_name: sbk-cert-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - staticfiles:/app/staticfiles
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery-worker:
    build: .
    container_name: sbk-cert-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    entrypoint: []
    command: sh -c "mkdir -p /app/logs && celery -A web_generator worker -l info"

  celery-beat:
    build: .
    container_name: sbk-cert-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    entrypoint: []
    command: sh -c "mkdir -p /app/logs && celery -A web_generator beat -l info"

  redis:
    image: redis:7-alpine
    container_name: sbk-cert-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  staticfiles:
