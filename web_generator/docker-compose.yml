services:
  web:
    build: .
    container_name: sbk-cert-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py setup_celery_schedule &&
             gunicorn web_generator.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 120"

  celery-worker:
    build: .
    container_name: sbk-cert-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A web_generator worker -l info

  celery-beat:
    build: .
    container_name: sbk-cert-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A web_generator beat -l info

  redis:
    image: redis:7-alpine
    container_name: sbk-cert-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    container_name: sbk-cert-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  redis_data:
